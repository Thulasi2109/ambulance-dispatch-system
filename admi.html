<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body{font-family:Arial;background:#eef3f7;margin:0}
    header{background:#d90429;color:white;padding:20px;text-align:center}
    .box{background:white;width:90%;margin:25px auto;padding:25px;border-radius:12px;box-shadow:0 0 10px #ccc}
    input{width:90%;padding:10px;margin:8px;border:1px solid #ccc;border-radius:6px}
    button,a{background:#d90429;color:white;border:none;padding:10px 16px;margin:6px;border-radius:6px;text-decoration:none;cursor:pointer}
    .card{background:#f8f9fa;padding:14px;margin:12px 0;border-left:5px solid #d90429}
    #adminArea{display:none}
  </style>
</head>
<body>
<header><h1>Admin Panel</h1></header>

<div class="box" id="loginBox">
  <h2>Admin Login</h2>
  <input type="password" id="password" placeholder="Enter Admin Password">
  <button onclick="login()">Login</button>
  <a href="index.html">Back</a>
</div>

<div class="box" id="adminArea">
  <h2>Add Ambulance</h2>
  <input id="ambulanceId" placeholder="Ambulance ID / Driver Login ID">
  <input id="driverName" placeholder="Driver Name">
  <input id="ambulanceLocation" placeholder="Ambulance Location">
  <input id="ambulanceLat" type="number" step="any" placeholder="Ambulance Latitude">
  <input id="ambulanceLng" type="number" step="any" placeholder="Ambulance Longitude">

  <button onclick="addAmbulance()">Add Ambulance</button>
  <button onclick="viewAmbulances()">View Ambulances</button>
  <button onclick="viewRequests()">View Requests</button>
  <button onclick="dispatchAmbulance()">Dispatch Nearest Ambulance</button>
  <a href="index.html">Logout</a>

  <div id="output"></div>
</div>

<script>
function login(){
  if(password.value === "admin123"){
    loginBox.style.display = "none";
    adminArea.style.display = "block";
  } else {
    alert("Incorrect password");
  }
}

function getRequests(){ return JSON.parse(localStorage.getItem("requests")) || []; }
function saveRequests(data){ localStorage.setItem("requests", JSON.stringify(data)); }
function getAmbulances(){ return JSON.parse(localStorage.getItem("ambulances")) || []; }
function saveAmbulances(data){ localStorage.setItem("ambulances", JSON.stringify(data)); }

function addAmbulance(){
  let ambulances = getAmbulances();

  let id = ambulanceId.value;
  let driver = driverName.value;
  let loc = ambulanceLocation.value;
  let lat = parseFloat(ambulanceLat.value);
  let lng = parseFloat(ambulanceLng.value);

  if(!id || !driver || !loc || isNaN(lat) || isNaN(lng)){
    alert("Please fill all ambulance details");
    return;
  }

  ambulances.push({
    id:id,
    driver:driver,
    location:loc,
    lat:lat,
    lng:lng,
    status:"Available",
    assignedRequestId:null
  });

  saveAmbulances(ambulances);

  output.innerHTML = `<div class="card">
    <h3>Ambulance Added Successfully</h3>
    <p><b>Ambulance ID:</b> ${id}</p>
    <p><b>Driver:</b> ${driver}</p>
  </div>`;
}

function viewAmbulances(){
  let ambulances = getAmbulances();
  let html = "<h3>Ambulance List</h3>";

  if(ambulances.length === 0) html += "<p>No ambulances added.</p>";

  ambulances.forEach(a=>{
    html += `<div class="card">
      <p><b>Ambulance ID:</b> ${a.id}</p>
      <p><b>Driver:</b> ${a.driver}</p>
      <p><b>Location:</b> ${a.location}</p>
      <p><b>GPS:</b> ${a.lat}, ${a.lng}</p>
      <p><b>Status:</b> ${a.status}</p>
      <p><b>Assigned Request:</b> ${a.assignedRequestId || "None"}</p>
    </div>`;
  });

  output.innerHTML = html;
}

function viewRequests(){
  let requests = getRequests();
  let html = "<h3>Emergency Requests</h3>";

  if(requests.length === 0) html += "<p>No requests found.</p>";

  requests.forEach(r=>{
    html += `<div class="card">
      <p><b>Request ID:</b> ${r.id}</p>
      <p><b>Patient:</b> ${r.name}</p>
      <p><b>Phone:</b> ${r.phone}</p>
      <p><b>Location:</b> ${r.location}</p>
      <p><b>GPS:</b> ${r.lat}, ${r.lng}</p>
      <p><b>Emergency:</b> ${r.type}</p>
      <p><b>Severity:</b> ${r.severity}</p>
      <p><b>Status:</b> ${r.status}</p>
      <p><b>Ambulance:</b> ${r.ambulanceId}</p>
      <p><b>Driver Status:</b> ${r.driverStatus}</p>
    </div>`;
  });

  output.innerHTML = html;
}

function gpsDistance(lat1, lon1, lat2, lon2){
  const R = 6371;
  let dLat = (lat2-lat1) * Math.PI/180;
  let dLon = (lon2-lon1) * Math.PI/180;
  let a =
    Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)*Math.sin(dLon/2);
  let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return (R*c).toFixed(2);
}

function dispatchAmbulance(){
  let requests = getRequests();
  let ambulances = getAmbulances();

  let pending = requests.filter(r=>r.status === "Pending");
  let available = ambulances.filter(a=>a.status === "Available");

  if(pending.length === 0){ alert("No pending requests"); return; }
  if(available.length === 0){ alert("No available ambulance"); return; }

  pending.sort((a,b)=>b.severity-a.severity);
  let selected = pending[0];

  let nearest = available[0];
  let minDist = gpsDistance(nearest.lat, nearest.lng, selected.lat, selected.lng);

  available.forEach(a=>{
    let d = gpsDistance(a.lat, a.lng, selected.lat, selected.lng);
    if(parseFloat(d) < parseFloat(minDist)){
      minDist = d;
      nearest = a;
    }
  });

  selected.status = "Ambulance Assigned";
  selected.ambulanceId = nearest.id;
  selected.driver = nearest.driver;
  selected.driverStatus = "Assigned";

  nearest.status = "Busy";
  nearest.assignedRequestId = selected.id;

  saveRequests(requests);
  saveAmbulances(ambulances);

  output.innerHTML = `<div class="card">
    <h3>Nearest Ambulance Dispatched</h3>
    <p><b>Request ID:</b> ${selected.id}</p>
    <p><b>Patient:</b> ${selected.name}</p>
    <p><b>Ambulance ID:</b> ${nearest.id}</p>
    <p><b>Driver:</b> ${nearest.driver}</p>
    <p><b>Distance:</b> ${minDist} km</p>
  </div>`;
}
</script>
</body>
</html>
