<!DOCTYPE html>
<html>
<head>
  <title>User Panel</title>
  <style>
    body{font-family:Arial;background:#eef3f7;margin:0}
    header{background:#d90429;color:white;padding:20px;text-align:center}
    .box{background:white;width:90%;margin:25px auto;padding:25px;border-radius:12px;box-shadow:0 0 10px #ccc}
    input,select{width:90%;padding:10px;margin:8px;border:1px solid #ccc;border-radius:6px}
    button,a{background:#d90429;color:white;border:none;padding:10px 16px;margin:6px;border-radius:6px;text-decoration:none;cursor:pointer}
    .card{background:#f8f9fa;padding:14px;margin:12px 0;border-left:5px solid #d90429}
  </style>
</head>
<body>
<header><h1>User Panel</h1></header>

<div class="box">
  <h2>Register Emergency Request</h2>

  <input id="userName" placeholder="Patient Name">
  <input id="phone" placeholder="Phone Number">
  <input id="location" placeholder="Location Name">

  <input id="patientLat" type="number" step="any" placeholder="Patient Latitude">
  <input id="patientLng" type="number" step="any" placeholder="Patient Longitude">
  <button onclick="getGPS('patientLat','patientLng')">Get My GPS Location</button>

  <select id="emergencyType">
    <option>Accident</option>
    <option>Heart Attack</option>
    <option>Pregnancy Emergency</option>
    <option>Fire Injury</option>
    <option>Other</option>
  </select>

  <select id="severity">
    <option value="1">Severity 1 - Low</option>
    <option value="2">Severity 2</option>
    <option value="3">Severity 3 - Medium</option>
    <option value="4">Severity 4</option>
    <option value="5">Severity 5 - Critical</option>
  </select>

  <button onclick="registerEmergency()">Submit Request</button>
  <button onclick="viewRequests()">View Status</button>
  <a href="index.html">Back</a>

  <div id="output"></div>
</div>

<script>
function getGPS(latInputId, lngInputId) {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      document.getElementById(latInputId).value = position.coords.latitude;
      document.getElementById(lngInputId).value = position.coords.longitude;
      alert("GPS location fetched successfully!");
    }, function() {
      alert("Please allow location permission.");
    });
  } else {
    alert("GPS not supported.");
  }
}

function getRequests(){
  return JSON.parse(localStorage.getItem("requests")) || [];
}

function saveRequests(data){
  localStorage.setItem("requests", JSON.stringify(data));
}

function getAmbulances(){
  return JSON.parse(localStorage.getItem("ambulances")) || [];
}

function registerEmergency(){
  let requests = getRequests();

  let request = {
    id: "REQ" + Date.now(),
    name: userName.value,
    phone: phone.value,
    location: location.value,
    lat: patientLat.value,
    lng: patientLng.value,
    type: emergencyType.value,
    severity: severity.value,
    status: "Pending",
    driverStatus: "Waiting",
    ambulanceId: null
  };

  requests.push(request);
  saveRequests(requests);

  alert("Emergency request submitted successfully! Your Request ID is: " + request.id);
  viewRequests();
}

function viewRequests(){
  let requests = getRequests();
  let ambulances = getAmbulances();

  output.innerHTML = "<h3>Request Status</h3>";

  requests.forEach(req => {
    let amb = ambulances.find(a => a.id === req.ambulanceId);

    output.innerHTML += `<div class="card">
      <p><b>Request ID:</b> ${req.id}</p>
      <p><b>Patient:</b> ${req.name}</p>
      <p><b>Location:</b> ${req.location}</p>
      <p><b>Patient GPS:</b> ${req.lat}, ${req.lng}</p>
      <p><b>Emergency:</b> ${req.type}</p>
      <p><b>Status:</b> ${req.status}</p>
      <p><b>Driver Status:</b> ${req.driverStatus}</p>
      <p><b>Assigned Ambulance:</b> ${req.ambulanceId || "Not Assigned"}</p>
      <p><b>Driver GPS:</b> ${amb ? amb.lat + ", " + amb.lng : "Not Available"}</p>
    </div>`;
  });
}
</script>
</body>
</html>
